<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1dea — Журнал мыслей</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; }
.app { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.app-header h1 { font-size: 20px; font-weight: 500; }
.sub { font-size: 13px; color: #888; margin-bottom: 1.25rem; }
.card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
textarea { width: 100%; min-height: 80px; resize: vertical; font-size: 14px; border: none; outline: none; background: transparent; font-family: inherit; line-height: 1.6; color: #111; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
.tag-btn { font-size: 12px; padding: 4px 10px; border-radius: 8px; border: 1px solid #ddd; background: transparent; cursor: pointer; color: #666; }
.tag-btn.active { background: #e8f0fe; color: #1a56db; border-color: #a4c0fb; }
.add-btn { width: 100%; padding: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 8px; border: 1px solid #ddd; background: transparent; }
.add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.digest-btn { width: 100%; padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 1.25rem; border-radius: 8px; border: 1px solid #a4c0fb; background: #e8f0fe; color: #1a56db; }
.digest-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.entries-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.entries-label { font-size: 13px; color: #888; }
.clear-btn { font-size: 12px; padding: 3px 8px; border-radius: 8px; border: 1px solid #ddd; background: transparent; color: #888; cursor: pointer; }
.entry { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 8px; position: relative; }
.entry-meta { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
.entry-tag { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: #f0f0f0; color: #555; }
.entry-time { font-size: 11px; color: #aaa; }
.entry-text { font-size: 14px; line-height: 1.5; word-break: break-word; padding-right: 20px; }
.del-btn { position: absolute; top: 8px; right: 10px; background: none; border: none; font-size: 16px; cursor: pointer; color: #ccc; line-height: 1; }
.del-btn:hover { color: #e00; }
.digest-card { background: #f9f9f9; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; }
.digest-card h3 { font-size: 15px; font-weight: 500; margin-bottom: 10px; }
.digest-content { font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
.empty { text-align: center; padding: 2rem; color: #aaa; font-size: 14px; }
.error-msg { font-size: 13px; color: #c00; background: #fff0f0; border: 1px solid #fcc; border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem; }
</style>
</head>
<body>
<div class="app">
  <div class="app-header"><h1>1dea</h1></div>
  <div class="sub" id="entry-count">Загрузка...</div>

  <div class="card">
    <textarea id="thought-input" placeholder="Мысль, идея, задача... записывай как есть"></textarea>
    <div class="tags" id="tags">
      <button class="tag-btn active" data-tag="Идея">Идея</button>
      <button class="tag-btn" data-tag="Цель">Цель</button>
      <button class="tag-btn" data-tag="Срочно">Срочно</button>
      <button class="tag-btn" data-tag="Инсайт">Инсайт</button>
      <button class="tag-btn" data-tag="Продажи">Продажи</button>
      <button class="tag-btn" data-tag="Агентство">Агентство</button>
      <button class="tag-btn" data-tag="Личное">Личное</button>
      <button class="tag-btn" data-tag="Вопрос">Вопрос</button>
    </div>
    <button class="add-btn" id="add-btn" onclick="addEntry()">+ Записать мысль</button>
  </div>

  <div id="digest-area"></div>
  <div id="error-area"></div>

  <div class="entries-header">
    <span class="entries-label" id="entries-label">Записи</span>
    <button class="clear-btn" onclick="clearAll()">Очистить все</button>
  </div>
  <div id="entries-list"></div>
</div>

<script>
var BIN_ID = '69e22308856a682189443123';
var API_KEY = '$2a$10$9M0UjN6IGG4vC/YFyuoInOR6rnTpcWptl1CJcd37JKBevUB9NYWZS';
var BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;
var selectedTag = 'Идея';
var entries = [];

function jbHeaders(write) {
  var h = { 'X-Master-Key': API_KEY, 'Content-Type': 'application/json' };
  if (!write) h['X-Bin-Meta'] = 'false';
  return h;
}

function showError(msg) {
  document.getElementById('error-area').innerHTML = '<div class="error-msg">' + msg + '</div>';
  setTimeout(function() { document.getElementById('error-area').innerHTML = ''; }, 6000);
}

function loadEntries() {
  document.getElementById('entry-count').textContent = 'Загрузка...';
  fetch(BIN_URL + '/latest', { headers: jbHeaders(false) })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      entries = (data.entries || []).slice().reverse();
      render();
    })
    .catch(function(e) { showError('Ошибка загрузки: ' + e.message); document.getElementById('entry-count').textContent = 'Ошибка'; });
}

function saveEntries(newEntries) {
  return fetch(BIN_URL, {
    method: 'PUT',
    headers: jbHeaders(true),
    body: JSON.stringify({ entries: newEntries })
  }).then(function(r) { if (!r.ok) throw new Error('Save error ' + r.status); });
}

function addEntry() {
  var text = document.getElementById('thought-input').value.trim();
  if (!text) return;
  var btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = 'Сохраняю...';
  var entry = { id: Date.now(), text: text, tag: selectedTag, time: new Date().toISOString() };
  var updated = [entry].concat(entries).slice(0, 200);
  saveEntries(updated)
    .then(function() { document.getElementById('thought-input').value = ''; loadEntries(); })
    .catch(function(e) { showError('Ошибка сохранения: ' + e.message); })
    .finally(function() { btn.disabled = false; btn.textContent = '+ Записать мысль'; });
}

function deleteEntry(id) {
  var updated = entries.filter(function(e) { return e.id !== id; });
  saveEntries(updated)
    .then(function() { loadEntries(); })
    .catch(function() { showError('Ошибка удаления'); });
}

function clearAll() {
  if (!entries.length) return;
  if (!confirm('Удалить все ' + entries.length + ' записей?')) return;
  saveEntries([])
    .then(function() { loadEntries(); document.getElementById('digest-area').innerHTML = ''; })
    .catch(function(e) { showError('Ошибка: ' + e.message); });
}

function fmt(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  return d.toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
}

function render() {
  var n = entries.length;
  document.getElementById('entry-count').textContent = n ? n + ' запис' + (n===1?'ь':n<5?'и':'ей') + ' сохранено' : 'Нет записей';
  document.getElementById('entries-label').textContent = n ? 'Все записи (' + n + ')' : 'Записи';
  var list = document.getElementById('entries-list');
  if (!n) { list.innerHTML = '<div class="empty">Пока пусто — напиши первую мысль</div>'; return; }
  list.innerHTML = entries.map(function(e) {
    var tag = e.tag || '—';
    var text = (e.text || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return '<div class="entry"><div class="entry-meta"><span class="entry-tag">' + tag + '</span><span class="entry-time">' + fmt(e.time) + '</span></div><div class="entry-text">' + text + '</div><button class="del-btn" onclick="deleteEntry(' + e.id + ')">×</button></div>';
  }).join('');
}

document.getElementById('tags').addEventListener('click', function(e) {
  if (!e.target.matches('.tag-btn')) return;
  document.querySelectorAll('.tag-btn').forEach(function(b) { b.classList.remove('active'); });
  e.target.classList.add('active');
  selectedTag = e.target.dataset.tag;
});

loadEntries();
</script>
</body>
</html>
