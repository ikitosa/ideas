<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Журнал мыслей</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; padding: 1rem; }
.app { max-width: 680px; margin: 0 auto; padding: 1rem 0 2rem; }
h2 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
.card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
textarea { width: 100%; min-height: 80px; resize: vertical; font-size: 14px; border: none; outline: none; background: transparent; font-family: inherit; line-height: 1.6; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
.tag-btn { font-size: 12px; padding: 4px 10px; border-radius: 8px; border: 1px solid #ddd; background: transparent; cursor: pointer; color: #666; transition: all 0.15s; }
.tag-btn.active { background: #e8f0fe; color: #1a56db; border-color: #a4c0fb; }
.add-btn { width: 100%; padding: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 8px; border: 1px solid #ddd; background: transparent; transition: all 0.15s; }
.add-btn:hover { background: #f5f5f5; }
.digest-btn { width: 100%; padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 1.5rem; border-radius: 8px; border: 1px solid #a4c0fb; background: #e8f0fe; color: #1a56db; transition: all 0.15s; }
.digest-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.entries-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.entries-header span { font-size: 13px; color: #888; }
.clear-btn { font-size: 12px; padding: 3px 8px; border-radius: 8px; border: 1px solid #ddd; background: transparent; color: #888; cursor: pointer; }
.entry { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 8px; position: relative; }
.entry-meta { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
.entry-tag { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: #f0f0f0; color: #555; }
.entry-time { font-size: 11px; color: #aaa; }
.entry-text { font-size: 14px; line-height: 1.5; }
.del-btn { position: absolute; top: 8px; right: 10px; background: none; border: none; font-size: 16px; cursor: pointer; color: #ccc; }
.del-btn:hover { color: #e00; }
.digest-card { background: #f9f9f9; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
.digest-card h3 { font-size: 15px; font-weight: 500; margin-bottom: 10px; }
.digest-content { font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
.empty { text-align: center; padding: 2rem; color: #aaa; font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <h2>Журнал мыслей</h2>
  <div class="sub" id="entry-count">Загрузка...</div>

  <div class="card">
    <textarea id="thought-input" placeholder="Мысль, идея, задача... записывай как есть"></textarea>
    <div class="tags" id="tags">
      <button class="tag-btn active" data-tag="idea">Идея</button>
      <button class="tag-btn" data-tag="goal">Цель</button>
      <button class="tag-btn" data-tag="urgent">Срочно</button>
      <button class="tag-btn" data-tag="question">Вопрос</button>
      <button class="tag-btn" data-tag="insight">Инсайт</button>
      <button class="tag-btn" data-tag="sales">Продажи</button>
      <button class="tag-btn" data-tag="agency">Агентство</button>
      <button class="tag-btn" data-tag="personal">Личное</button>
    </div>
    <button class="add-btn" onclick="addEntry()">+ Записать мысль</button>
  </div>

  <button class="digest-btn" id="digest-btn" onclick="generateDigest()">✨ Утренний дайджест — AI анализ всех записей</button>

  <div id="digest-area"></div>

  <div class="entries-header">
    <span id="entries-label">Записи</span>
    <button class="clear-btn" onclick="clearAll()">Очистить всё</button>
  </div>
  <div id="entries-list"></div>
</div>

<script>
const STORAGE_KEY = 'journal-entries-v2';
const TAG_LABELS = {idea:'Идея',goal:'Цель',urgent:'Срочно',question:'Вопрос',insight:'Инсайт',sales:'Продажи',agency:'Агентство',personal:'Личное'};
let selectedTag = 'idea';
let entries = [];

function load() {
  try { entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { entries = []; }
  render();
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }

function addEntry() {
  const text = document.getElementById('thought-input').value.trim();
  if (!text) return;
  entries.unshift({ id: Date.now(), text, tag: selectedTag, time: new Date().toISOString() });
  save(); render();
  document.getElementById('thought-input').value = '';
}

function deleteEntry(id) { entries = entries.filter(e => e.id !== id); save(); render(); }

function clearAll() {
  if (!entries.length) return;
  if (confirm('Очистить все записи?')) { entries = []; save(); render(); document.getElementById('digest-area').innerHTML = ''; }
}

function fmt(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
}

function render() {
  const n = entries.length;
  document.getElementById('entry-count').textContent = n ? `${n} запис${n===1?'ь':n<5?'и':'ей'} сохранено` : 'Нет записей';
  document.getElementById('entries-label').textContent = n ? `Все записи (${n})` : 'Записи';
  const list = document.getElementById('entries-list');
  if (!n) { list.innerHTML = '<div class="empty">Пока пусто — напиши первую мысль</div>'; return; }
  list.innerHTML = entries.map(e => `<div class="entry"><div class="entry-meta"><span class="entry-tag">${TAG_LABELS[e.tag]||e.tag}</span><span class="entry-time">${fmt(e.time)}</span></div><div class="entry-text">${e.text.replace(/</g,'&lt;')}</div><button class="del-btn" onclick="deleteEntry(${e.id})">×</button></div>`).join('');
}

document.getElementById('tags').addEventListener('click', e => {
  if (!e.target.matches('.tag-btn')) return;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  selectedTag = e.target.dataset.tag;
});

async function generateDigest() {
  if (!entries.length) { alert('Нет записей для анализа'); return; }
  const btn = document.getElementById('digest-btn');
  btn.disabled = true;
  const area = document.getElementById('digest-area');
  area.innerHTML = `<div class="digest-card"><h3>Утренний дайджест</h3><div class="digest-content">Анализирую...</div></div>`;
  const entriesText = entries.map(e => `[${TAG_LABELS[e.tag]}] ${fmt(e.time)}: ${e.text}`).join('\n');
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1000,
        system:'Ты личный AI-ассистент Андрея — заместителя коммерческого директора (ООО ЛАЗЕРТАГ, ООО КИБЕРТАГ) и основателя AI-автоматизационного агентства. Отвечай на русском.',
        messages:[{role:'user',content:`Мои записи:\n${entriesText}\n\nДай дайджест:\n📊 КАРТИНА В ЦЕЛОМ\n🔥 ТОП-3 ПРИОРИТЕТА\n💡 ИНСАЙТЫ\n🎯 РЕКОМЕНДАЦИИ\n❓ ОТКРЫТЫЕ ВОПРОСЫ`}]
      })
    });
    const data = await resp.json();
    const text = data.content?.map(b=>b.text||'').join('') || 'Ошибка';
    area.innerHTML = `<div class="digest-card"><h3>Дайджест — ${new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'long'})}</h3><div class="digest-content">${text.replace(/</g,'&lt;')}</div></div>`;
  } catch(e) {
    area.innerHTML = `<div class="digest-card"><div class="digest-content" style="color:red">Ошибка: ${e.message}</div></div>`;
  }
  btn.disabled = false;
}

load();
</script>
</body>
</html>
